name: QA Automation - PR Smoke Validation

on:
  pull_request:
    branches: [ main, master ]

jobs:
  smoke-testing:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar el repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar JDK y Caché de Maven
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Ejecutar solo Smoke Tests (Rápido)
      - name: Execute Smoke Karate Tests
        run: mvn clean test -Dkarate.options="--tags @smoke"
        
      # 4. Guardar reporte SIEMPRE (Ayuda al desarrollador/QA a ver qué rompió el PR)
      - name: Upload Smoke Karate Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: karate-smoke-reports
          path: target/karate-reports/
          retention-days: 3 # Pocos días de retención para optimizar almacenamiento

      # 5. Notificar a Teams solo si falla
      - name: Microsoft Teams Notification
        if: failure()
        uses: jdcargile/ms-teams-notification@v1.4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          ms-teams-webhook-uri: ${{ secrets.TEAMS_WEBHOOK_URL }}
          notification-summary: "⚠️ PR Bloqueado: Falló la validación Smoke"
          notification-color: "FF9900"